name: Refresh Stats Data

on:
  schedule:
    - cron: '17,47 7-16 * * 1-5'  # Semaine peak: /30min 9h-18h Paris (couvre été+hiver)
    - cron: '17 7-16 * * 0,6'     # Weekend peak: /1h 9h-18h Paris
    - cron: '17 5,18,21 * * *'    # Off-peak tous les jours: 7h, 20h, 23h Paris (été)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch snapshots from Supabase
        run: node scripts/fetch-snapshots.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Inject Supabase credentials
        run: |
          # Vérifier que les secrets ne sont pas vides
          if [ -z "$SB_URL" ] || [ -z "$SB_KEY" ]; then
            echo "::error::SUPABASE_URL or SUPABASE_ANON_KEY secret is empty or not configured"
            exit 1
          fi

          sed -i "s|__SUPABASE_URL__|${SB_URL}|g" docs/shared/data.js
          sed -i "s|__SUPABASE_ANON_KEY__|${SB_KEY}|g" docs/shared/data.js

          if grep -q '__SUPABASE_URL__\|__SUPABASE_ANON_KEY__' docs/shared/data.js; then
            echo "::error::Supabase tokens not replaced."
            exit 1
          fi
        env:
          SB_URL: ${{ secrets.SUPABASE_URL }}
          SB_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
